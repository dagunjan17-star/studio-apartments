name: Auto Sync to project repos

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"

      # Existing Repo
      # - name: Sync to Studio Apartments Repo
      #   continue-on-error: true
      #   run: |
      #     git remote remove mirror || true
      #     git remote add mirror https://x-access-token:${{ secrets.GURGAON_ACCESS_TOKEN }}@github.com/dealacresGurgaon/Studio-Apartments.git
      #     git push mirror HEAD:main --force

      # Frontend Repo
      - name: Sync to Gurgaon Studio Apartment Frontend
        continue-on-error: true
        run: |
          git remote remove frontend || true
          git remote add frontend https://x-access-token:${{ secrets.MUKESH_PROJECTS_ACCESS_TOKEN }}@github.com/mukeshkumar44/gurgaon-studio-apartment-frontend.git
          git push frontend HEAD:main --force

      # Nagori Gate Repo
      - name: Sync to Nagori Gate Studio Apartments
        continue-on-error: true
        run: |
          git remote remove nagori || true
          git remote add nagori https://x-access-token:${{ secrets.NAGORI_GATE_PROJECTS_ACCESS_TOKEN }}@github.com/dealacresnagorigate/studio-apartments.git
          git push nagori HEAD:main --force